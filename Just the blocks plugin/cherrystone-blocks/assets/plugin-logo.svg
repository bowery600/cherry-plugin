<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Cherrystone Blocks</title>
  <desc id="desc">A polished cherrystone clam shell mark for the Cherrystone Blocks WordPress plugin.</desc>
  <rect width="256" height="256" rx="54" fill="#0a4266"/>
  <rect x="18" y="18" width="220" height="220" rx="38" fill="none" stroke="#ffffff" stroke-width="6" stroke-opacity="0.9"/>
  
  <!-- Styled Clam Shell -->
  <g transform="translate(10, 12)">
    <!-- Outermost Rib -->
    <path d="M 62,126 C 46,168 86,200 128,190 C 166,180 186,142 186,110" fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
    <!-- 2nd concentric Rib -->
    <path d="M 78,116 C 65,150 98,178 132,168 C 162,158 174,128 174,102" fill="none" stroke="#ffffff" stroke-width="13" stroke-linecap="round"/>
    <!-- 3rd concentric Rib -->
    <path d="M 94,106 C 84,132 110,156 136,146 C 158,138 162,114 162,94" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
    <!-- 4th concentric Rib -->
    <path d="M 110,96 C 103,114 121,134 139,124 C 153,118 150,100 150,86" fill="none" stroke="#ffffff" stroke-width="11" stroke-linecap="round"/>
    <!-- 5th concentric Rib -->
    <path d="M 126,86 C 122,96 131,110 140,100 C 145,96 140,86 138,78" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
    <!-- Hinge / Umbo detail -->
    <path d="M 174,74 C 182,80 194,92 188,102" fill="none" stroke="#ffffff" stroke-width="11" stroke-linecap="round"/>
  </g>
</svg>
